		// малюємо сніговика
		var canvas = document.getElementById("canvas");
		var ctx = canvas.getContext("2d");

		var circle = function (x, y, radius, fillCircle) {
			ctx.beginPath();
			ctx.arc(x, y, radius, 0, Math.PI * 2, false);
			ctx.stroke();
			if (fillCircle == true) {
				ctx.fill();
			}
		}
		ctx.lineWidth = 4;

		circle(100, 40, 30, false);
		ctx.strokeStyle = "Orange";
		ctx.fillStyle = "Orange";
		circle(100, 40, 3, true);
		ctx.strokeStyle = "Black";
		ctx.fillStyle = "Black";
		circle(90, 30, 3, true);
		circle(110, 30, 3, true);

		circle(100, 110, 40, false);
		circle(100, 110, 3, true);
		circle(100, 90, 3, true);
