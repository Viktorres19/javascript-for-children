		/*збільшуємо ширину та висоту квадрату на 1*/

		/*----------бджілка, що літає за випадковим маршрутом----------*/
		/*функція з чотирьма аргументами*/
		var circle = function (x, y, radius, fillCircle) {
			ctx.beginPath();
			/*метод arc малює коло*/
			ctx.arc(x, y, radius, 0, Math.PI * 2, false);
			/*якщо fillCircle true - малюэмо заповнений круг*/
			if (fillCircle) {
				ctx.fill();
			/*якщо fillCircle false - малюэмо обрис*/
			} else {
				ctx.stroke();
			}
		};
		/*малюємо бджілку*/
		var drawBee = function (x, y) {
			/*ширина лінії*/
			ctx.lineWidth = 2;
			/*колір обводки*/
			ctx.strokeStyle = "Black";
			/*колір заливки*/
			ctx.fillStyle = "Gold";
			/*true означає, що буде заливка кола (тіло бджілки)*/
			circle(x, y, 8, true);
			/*false означає, що буде тільки обрис кола (тіло бджілки)*/
			circle(x, y, 8, false);
			/*крильця бджілки (на позиції 3 ми маємо радіус*/
			circle(x - 5, y - 11, 5, false);
			circle(x + 5, y - 11, 5, false);
			/*очі бджілки*/
			circle(x - 2, y - 1, 2, false);
			circle(x + 2, y - 1, 2, false);
		};
		/*оновлюємо локацію бджілки*/
		var update = function (coordinate) {
			var offset = Math.random() * 4 - 2;
			coordinate += offset;

			if (coordinate > 200) {
				coordinate = 200;
			}
			if (coordinate < 0) {
				coordinate = 0;
			}

			return coordinate;
		};

		var canvas = document.getElementById("canvas");
		var ctx = canvas.getContext("2d");

		var x = 100;
		var y = 100;

		setInterval(function () {
			/*очищаемо весь квадрат 200 на 200*/
			ctx.clearRect(0 , 0, 200, 200);
			/*викликаємо бджілку з початковими координатами 100 * 100*/
			drawBee(x, y);
			/*виклик оноблення локації бджілки*/
			x = update(x);
			y = update(y);
			/*обводимо квадрат рамкою*/
			ctx.strokeRect(0, 0, 200, 200);
		}, 30);

		/*----------м'ячик стрибунець!----------*/
