		/*#2 фінальне завдання - заголовок рухається по квадрату*/
		var leftOffset = 0;

		var moveRight;
		var moveHeaderBottom;
		var moveHeaderLeft;
		var moveHeaderTop;
		var moveHeading = function () {
			$("#heading").offset({
				left: leftOffset,

			});
			leftOffset++;
